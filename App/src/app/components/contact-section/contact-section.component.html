<section id="contact" class="section">
  <div class="container contact-container">
    <div class="section-heading narrow">
      <p class="eyebrow">{{ state.t().contact.title }}</p>
      <h2>{{ state.t().contact.subtitle }}</h2>
      <p class="section-copy">{{ state.t().contact.description }}</p>
    </div>

    <article class="glass-card contact-panel" aria-label="Coordonnées">
      <div class="photo-placeholder" aria-label="Emplacement photo">
        <span>Votre photo</span>
      </div>

      <div class="contact-items">
        <div class="contact-item">
          <div class="contact-icon">
            <svg class="icon icon-sm"><use href="#i-mail"></use></svg>
          </div>
          <div>
            <p class="contact-label">Email</p>
            <a class="contact-link" href="mailto:mouheb.jerou&#64;email.com">mouheb.jerou&#64;email.com</a>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-icon">
            <svg class="icon icon-sm"><use href="#i-linkedin"></use></svg>
          </div>
          <div>
            <p class="contact-label">LinkedIn</p>
            <a
              class="contact-link"
              href="https://www.linkedin.com/in/mouheb-jerou-8a6654178/"
              target="_blank"
              rel="noopener noreferrer"
            >
              Voir mon profil LinkedIn
            </a>
          </div>
        </div>
      </div>
    </article>
  </div>
</section>

<section id="parcours" class="section section-muted">
  <div class="container timeline-container">
    <div class="section-heading">
      <p class="eyebrow">{{ state.t().parcours.title }}</p>
      <h2>{{ state.t().parcours.subtitle }}</h2>
    </div>

    <div class="timeline">
      <div class="timeline-axis"></div>

      <article class="timeline-item" *ngFor="let item of state.t().parcours.items">
        <div class="timeline-connector">
          <div class="timeline-node" [class.is-education]="item.type === 'education'">
            <!-- Work Icon: Briefcase with magnifier -->
            <svg *ngIf="item.type === 'work'" class="node-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 9h11a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-6a1 1 0 0 1 1-1z"/>
              <path d="M7 9V7a1.8 1.8 0 0 1 1.8-1.8h1.4A1.8 1.8 0 0 1 12 7v2"/>
              <circle cx="16.8" cy="15.8" r="3.2"/>
              <path d="M19.2 18.2L22 21"/>
            </svg>
            <!-- Education Icon: Graduate person -->
            <svg *ngIf="item.type === 'education'" class="node-icon node-icon-education" viewBox="0 0 24 24" fill="white">
              <path d="M12 2 2.5 5.8 12 9.6 21.5 5.8 12 2z"/>
              <path d="M3.8 6.6v5.2h1.4V7.2z"/>
              <circle cx="4.5" cy="12.9" r="0.9"/>
              <path d="M4.5 13.7 3.9 15.7h1.2L4.5 13.7z"/>
              <path d="M6.2 10v1.2c0 2.1 2.6 3.5 5.8 3.5s5.8-1.4 5.8-3.5V10L12 12.3 6.2 10z"/>
              <path d="M7.3 16.4c.9-0.8 2.8-1.4 4.7-1.4 2 0 3.9 0.6 4.8 1.4.8 0.7 1.3 1.7 1.3 2.8V22H5.9v-2.8c0-1.1.5-2.1 1.4-2.8z"/>
            </svg>
            <span class="node-pulse"></span>
          </div>
        </div>

        <div class="timeline-card">
          <div class="card-accent"></div>
          <div class="card-body">
            <span class="timeline-type" [class.is-education]="item.type === 'education'">
              {{ item.type === 'work' ? 'Expérience' : 'Formation' }}
            </span>
            <span class="timeline-year">{{ item.year }}</span>
            <h3 class="timeline-title">{{ item.title }}</h3>
            <div class="timeline-org">
              <img
                class="org-logo"
                [class.org-logo-wide]="item.org === 'ISCOD'"
                [src]="item.orgLogo"
                [alt]="'Logo ' + item.org"
                loading="lazy"
              />
              <a
                *ngIf="item.orgUrl; else orgText"
                class="org-link"
                [href]="item.orgUrl"
                target="_blank"
                rel="noopener noreferrer"
              >
                {{ item.org }}
              </a>
              <ng-template #orgText>
                <span>{{ item.org }}</span>
              </ng-template>
            </div>
            <p class="timeline-desc">{{ item.description }}</p>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>

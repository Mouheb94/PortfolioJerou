<section id="presentation" class="section">
  <div class="container">
    <div class="section-heading">
      <p class="eyebrow">{{ state.t().about.title }}</p>
      <h2>{{ state.t().about.subtitle }}</h2>
    </div>

    <div class="about-grid">
      <article class="glass-card about-card" *ngFor="let card of cards">
        <h3>{{ card.title }}</h3>
        <ng-container *ngIf="card.paragraphs?.length; else singleDescription">
          <div class="about-paragraphs">
            <p *ngFor="let paragraph of card.paragraphs">{{ paragraph }}</p>
          </div>
        </ng-container>
        <ng-template #singleDescription>
          <p>{{ card.description }}</p>
        </ng-template>

        <div class="interest-list" *ngIf="card.interests?.length">
          <article class="interest-item" *ngFor="let interest of card.interests">
            <h4>{{ interest.title }}</h4>
            <p>{{ interest.description }}</p>
          </article>
        </div>
      </article>
    </div>
  </div>
</section>

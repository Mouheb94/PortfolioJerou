<section id="realisations" class="section section-muted">
  <div class="container">
    <div class="section-heading">
      <p class="eyebrow">{{ state.t().projects.title }}</p>
      <h2>{{ state.t().projects.subtitle }}</h2>
    </div>

    <div class="projects-grid">
      <button
        type="button"
        class="project-card"
        [id]="'project-' + project.id"
        *ngFor="let project of projects; trackBy: trackByProject"
        (click)="openProject(project)"
      >
        <div class="project-copy">
          <span class="project-context" [class.project-context-school]="project.contextType === 'school'">
            {{ project.context.fr }}
          </span>
          <h3>{{ project.title.fr }}</h3>
          <p>{{ project.shortDesc.fr }}</p>
          <div class="chip-row">
            <span class="chip skill-chip" *ngFor="let skillId of project.skills">{{ getSkillName(skillId) }}</span>
          </div>
        </div>
      </button>
    </div>
  </div>
</section>

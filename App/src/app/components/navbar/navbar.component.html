<header class="site-header" [class.scrolled]="scrolled()">
  <nav class="nav-bar container">
    <button type="button" class="brand" aria-label="Accueil" (click)="navigate('/accueil')">
      <img
        class="brand-photo"
        src="https://media.licdn.com/dms/image/v2/D4E03AQHVVj1bwFbBbg/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1701079212929?e=1779321600&amp;v=beta&amp;t=S8Eu3in1tV38LsSJuWlBd8nYdpIvyXc1NPqanW010AI"
        alt="Photo de profil Mouheb Jerou"
      />
      <span class="brand-name">Mouheb Jerou</span>
    </button>

    <ul class="nav-links desktop-only">
      <li *ngFor="let link of navLinks">
        <ng-container *ngIf="link.key === 'competences'; else simpleLink">
          <div class="nav-link-group" [class.suppress-hover]="suppressSkillsHover()">
            <button
              type="button"
              class="nav-link nav-link-parent"
              (click)="navigateToCompetencesPage()"
            >
              {{ state.t().nav[link.key] }}
            </button>
            <ul class="skills-dropdown">
              <li class="skills-group-item">
                <button type="button" class="skill-sub-link group-link" (click)="navigate('/competences')">
                  Compétences techniques
                </button>
                <ul class="skills-flyout">
                  <li *ngFor="let skill of technicalSkillLinks">
                    <button type="button" class="skill-sub-link" (click)="navigateToSkill(skill.id)">
                      {{ skill.name }}
                    </button>
                  </li>
                </ul>
              </li>
              <li class="skills-group-item">
                <button type="button" class="skill-sub-link group-link" (click)="navigate('/competences')">
                  Compétences humaines
                </button>
                <ul class="skills-flyout">
                  <li *ngFor="let skill of humanSkillLinks">
                    <button type="button" class="skill-sub-link" (click)="navigateToSkill(skill.id)">
                      {{ skill.name }}
                    </button>
                  </li>
                </ul>
              </li>
            </ul>
          </div>
        </ng-container>
        <ng-template #simpleLink>
          <button
            type="button"
            class="nav-link"
            (click)="navigate(link.route)"
          >
            {{ state.t().nav[link.key] }}
          </button>
        </ng-template>
      </li>
    </ul>

    <div class="nav-actions">
      <button type="button" class="control-button icon-button" (click)="state.toggleTheme()" aria-label="Toggle theme">
        <svg class="icon icon-sm" *ngIf="state.darkTheme(); else moonIcon"><use href="#i-sun"></use></svg>
        <ng-template #moonIcon>
          <svg class="icon icon-sm"><use href="#i-moon"></use></svg>
        </ng-template>
      </button>

      <button type="button" class="control-button icon-button mobile-only" (click)="toggleMenu()" aria-label="Toggle menu">
        <svg class="icon" *ngIf="mobileOpen(); else menuIcon"><use href="#i-close"></use></svg>
        <ng-template #menuIcon>
          <svg class="icon"><use href="#i-menu"></use></svg>
        </ng-template>
      </button>
    </div>
  </nav>

  <div class="mobile-panel" *ngIf="mobileOpen()">
    <div class="container">
      <ul class="nav-links mobile-links">
        <li *ngFor="let link of navLinks">
          <ng-container *ngIf="link.key === 'competences'; else simpleMobileLink">
            <button
              type="button"
              class="nav-link mobile-nav-link"
              (click)="navigate(link.route)"
            >
              {{ state.t().nav[link.key] }}
            </button>
            <ul class="mobile-skill-submenu">
              <li class="mobile-skill-group-title">Compétences techniques</li>
              <li *ngFor="let skill of technicalSkillLinks">
                <button type="button" class="mobile-skill-link" (click)="navigateToSkill(skill.id)">
                  {{ skill.name }}
                </button>
              </li>
              <li class="mobile-skill-group-title">Compétences humaines</li>
              <li *ngFor="let skill of humanSkillLinks">
                <button type="button" class="mobile-skill-link" (click)="navigateToSkill(skill.id)">
                  {{ skill.name }}
                </button>
              </li>
            </ul>
          </ng-container>
          <ng-template #simpleMobileLink>
            <button
              type="button"
              class="nav-link mobile-nav-link"
              (click)="navigate(link.route)"
            >
              {{ state.t().nav[link.key] }}
            </button>
          </ng-template>
        </li>
      </ul>
    </div>
  </div>
</header>
